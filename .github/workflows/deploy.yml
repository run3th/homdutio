name: build-test-deploy

# Build + test gate on every PR and push to main (Phase 2).
# A gated, OIDC-authenticated deploy job is appended in Phase 3.
on:
  pull_request:
    branches: [main]
    # Docs/planning-only changes never affect the build artifact — skip the pipeline.
    # A commit touching any non-ignored path still triggers normally.
    paths-ignore:
      - 'context/**'
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [main]
    paths-ignore:
      - 'context/**'
      - 'docs/**'
      - '**/*.md'

# id-token:write is required by the Phase 3 deploy job's OIDC login (azure/login).
# Declared at the top level so both jobs inherit it; build-test only reads contents.
permissions:
  contents: read
  id-token: write

jobs:
  build-test:
    name: Build + Test
    # windows-latest ships MSSQLLocalDB, which the xUnit suites hardcode
    # (Server=(localdb)\MSSQLLocalDB) — preserves test parity, zero test changes.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # Angular 21 requires Node >=20.19 / 22.12; use 22. The Release build/publish
      # triggers the BuildAngularSpa MSBuild target (npm ci + ng build), so Node must
      # be present before any dotnet build/publish, not just for the npm test step.
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Start LocalDB
        run: sqllocaldb start MSSQLLocalDB

      - name: Restore
        run: dotnet restore Homdutio.sln

      # Release build runs BuildAngularSpa (npm ci where node_modules is absent, then
      # ng build) — a broken ng build fails the gate here.
      - name: Build (Release)
        run: dotnet build Homdutio.sln -c Release --no-restore

      # xUnit suites run against LocalDB with no config overrides (parity with local).
      - name: Test (.NET, LocalDB)
        run: dotnet test Homdutio.sln -c Release --no-build

      - name: Install web deps
        working-directory: web
        run: npm ci

      # ng test -> Vitest (jsdom). Runs once and exits in CI's non-interactive runner.
      - name: Test (Angular / Vitest)
        working-directory: web
        run: npm test

      # The single portable artifact: dotnet publish triggers BuildAngularSpa, bundling
      # the SPA into wwwroot. Framework-dependent output runs on the Linux App Service.
      - name: Publish (Release)
        run: dotnet publish src/Homdutio.Api/Homdutio.Api.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish
          retention-days: 7

  # Blocking E2E gate for the MVP cross-stack journey (Risk #4, test-plan §3 Phase 5).
  # Runs the Playwright two-member journey against the REAL running stack after build-test.
  # windows-latest matches build-test: LocalDB is Windows-only, so the same runner keeps
  # test parity. An isolated, run-scoped LocalDB (homdutio_e2e_<run_id>) means parallel PR
  # runs on the shared Windows runner pool never collide. Make this a required status check
  # in branch protection so a red journey blocks the merge.
  e2e:
    name: E2E (journey, Risk #4)
    needs: build-test
    runs-on: windows-latest
    # Out-of-band secrets for the API the webServer launches — there is no committed default.
    # The connection string names a run-scoped LocalDB that `dotnet ef database update` creates.
    # The signing key is an ephemeral, test-only HMAC key for this throwaway DB — NOT a
    # production secret (prod's key comes from App Service settings, never the repo).
    env:
      ConnectionStrings__DefaultConnection: 'Server=(localdb)\MSSQLLocalDB;Database=homdutio_e2e_${{ github.run_id }};Trusted_Connection=True;MultipleActiveResultSets=true;TrustServerCertificate=True'
      Jwt__SigningKey: 'e2e-ci-only-signing-key-not-a-production-secret-0123456789abcdef'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # Node must be present before the API launches: Playwright's webServer runs `ng serve`,
      # and the http launch profile keeps ASPNETCORE_ENVIRONMENT=Development (NoOp email sender).
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Start LocalDB
        run: sqllocaldb start MSSQLLocalDB

      # Restore the pinned dotnet-ef local tool (.config/dotnet-tools.json) so both this step
      # and Playwright's global-setup can run `dotnet ef` against the run-scoped DB.
      - name: Restore dotnet-ef
        run: dotnet tool restore

      # Migrations are NEVER applied on app startup (src/Homdutio.Data/MIGRATIONS.md): apply them
      # out-of-band here, creating/targeting the run-scoped DB from the connection string above.
      # Playwright's global-setup re-runs this (idempotent) before the API boots; running it here
      # too fails the job early and loudly if migrations don't apply.
      - name: Apply EF migrations (run-scoped DB)
        run: >-
          dotnet ef database update
          --project src/Homdutio.Data
          --startup-project src/Homdutio.Api

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      # `npm run e2e` = `playwright test`. CI=true (a GitHub Actions default) flips
      # reuseExistingServer to false, so Playwright's webServer boots a fresh API (:5252) +
      # ng serve (:4200), gating readiness on the API's /health probe before any spec runs.
      # The API inherits ConnectionStrings__DefaultConnection + Jwt__SigningKey from the job env.
      - name: Run Playwright journey
        working-directory: web
        run: npm run e2e

      # HTML report (with traces) for triaging a failed journey.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

      # Best-effort teardown of the run-scoped DB. The runner is ephemeral, so this is cosmetic;
      # continue-on-error keeps a drop failure (e.g. lingering connection) from failing the job.
      - name: Drop run-scoped E2E database
        if: always()
        continue-on-error: true
        run: sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "IF DB_ID('homdutio_e2e_${{ github.run_id }}') IS NOT NULL DROP DATABASE [homdutio_e2e_${{ github.run_id }}]"

  deploy:
    name: Deploy (production)
    needs: build-test
    # Deploy only on merges/pushes to main — never on pull_request.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    # Human approval gate: the production environment requires a reviewer.
    # The environment:production OIDC subject (DEPLOY_SETUP.md) authorizes the token.
    environment:
      name: production
      url: https://homdutio.azurewebsites.net
    # Serialize deploys so two rapid merges can't race migrate+deploy on the
    # single-instance B1 app. Do not cancel an in-flight production deploy.
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      # Source is needed for `dotnet ef` (the artifact is the published app, not
      # the EF tooling / migration assemblies).
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # OIDC — no long-lived secret in the repo. Requires id-token:write (top level).
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # The GitHub runner can't reach Azure SQL through AllowAzureServices, so open a
      # temporary rule for this runner's public IP. Rule name is run-scoped so the
      # always() removal below targets exactly this run's rule.
      - name: Open temporary SQL firewall rule
        run: |
          $ip = (Invoke-RestMethod -Uri https://api.ipify.org)
          Write-Host "Runner public IP: $ip"
          az sql server firewall-rule create `
            --resource-group homdutio-rg --server homdutio-sql `
            --name "gha-runner-$env:GITHUB_RUN_ID" `
            --start-ip-address $ip --end-ip-address $ip --only-show-errors

      - name: Restore dotnet-ef
        # The repo pins dotnet-ef in .config/dotnet-tools.json, so `dotnet ef`
        # resolves to the LOCAL tool and ignores any global install. Restore the
        # manifest to get the pinned version (9.0.9) available on the runner.
        run: dotnet tool restore

      # Migrate BEFORE deploying code (expand pattern). If this fails, the job stops
      # before the code swap, leaving the prior working build live. The connection
      # string is the production-environment admin secret, used only here.
      - name: Apply EF migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: >-
          dotnet ef database update
          --project src/Homdutio.Data
          --startup-project src/Homdutio.Api

      # MUST run even on a failed migration so the runner IP is never left allowlisted.
      - name: Remove temporary SQL firewall rule
        if: always()
        run: |
          az sql server firewall-rule delete `
            --resource-group homdutio-rg --server homdutio-sql `
            --name "gha-runner-$env:GITHUB_RUN_ID" --only-show-errors
          exit 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: homdutio
          package: ./publish

      # Post-deploy smoke. Poll /health (the app cold-starts after a deploy) and fail
      # the job if it never returns 200/Healthy — no auto-rollback, the run fails loudly.
      - name: Smoke test /health
        run: |
          $url = "https://homdutio.azurewebsites.net/health"
          $ok = $false
          for ($i = 1; $i -le 10; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 15
              if ($r.StatusCode -eq 200 -and $r.Content -match "Healthy") {
                $ok = $true; Write-Host "Smoke OK ($i): /health -> Healthy"; break
              }
              Write-Host "Attempt ${i}: status $($r.StatusCode), body '$($r.Content)'"
            } catch {
              Write-Host "Attempt ${i}: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 15
          }
          if (-not $ok) { Write-Error "Smoke test failed: /health did not return Healthy"; exit 1 }
