name: e2e-gate-shim

# Companion to build-test-deploy. That workflow's paths-ignore (context/**, docs/**,
# **/*.md) skips it for docs-only changes — but the `e2e` job is a REQUIRED status
# check ("E2E (journey, Risk #4)", ruleset e2e-gate). A required check that never
# reports leaves a docs-only PR permanently "waiting for status" and unmergeable.
#
# This shim triggers on exactly those ignored paths and reports a same-named check as
# success, so docs-only PRs merge. The journey itself is genuinely N/A for a docs-only
# change (no code moved), so a green report is truthful, not a bypass.
#
# Mixed PRs (code + docs) trigger BOTH the real job and this shim; the real ~8-min job
# reports well after this ~seconds shim, and branch protection uses the latest run for a
# context, so the real result stays authoritative. Code-only PRs don't match these paths,
# so only the real job runs. (This is GitHub's documented "skipped but required" pattern.)
#
# The job name MUST stay byte-identical to the real job's name in deploy.yml — the required
# status-check context is the job name. Rename one, rename both.

on:
  pull_request:
    branches: [main]
    paths:
      - 'context/**'
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [main]
    paths:
      - 'context/**'
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (journey, Risk #4)
    runs-on: ubuntu-latest
    steps:
      - name: Docs-only change — E2E journey not applicable
        run: echo "Docs-only change; the cross-stack journey is unaffected. Reporting green so the required E2E check is satisfied."
