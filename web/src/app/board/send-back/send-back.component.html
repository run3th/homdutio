<section class="modal send-back" role="dialog" aria-modal="true" aria-labelledby="send-back-heading">
  <h2 id="send-back-heading" class="modal-title">Send back?</h2>
  <p class="dialog-body">
    “{{ task.title }}” will return to In progress for {{ task.claimerName ?? 'the claimer' }}. Add a
    short reason — it's posted to the task's comments.
  </p>

  <label class="send-back-field">
    <span class="send-back-label">Reason</span>
    <textarea
      class="send-back-input"
      [formControl]="comment"
      rows="3"
      maxlength="280"
      placeholder="What needs another look?"
    ></textarea>
  </label>

  <div class="modal-actions">
    <button type="button" class="btn btn--ghost" (click)="cancel()">Cancel</button>
    <button type="button" class="btn" [disabled]="comment.invalid" (click)="submit()">
      Send back
    </button>
  </div>
</section>
