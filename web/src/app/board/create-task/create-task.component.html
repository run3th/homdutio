<section class="modal" role="dialog" aria-modal="true" aria-labelledby="create-task-heading">
  <header class="modal-header">
    <div>
      <h2 id="create-task-heading" class="modal-title">New task</h2>
      <p class="modal-subtitle">Add a task to the board.</p>
    </div>
    <button type="button" class="modal-close" aria-label="Close" (click)="close()">✕</button>
  </header>

  @if (errors().length) {
    <div class="form-error" role="alert">
      @for (message of errors(); track message) {
        <p>{{ message }}</p>
      }
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="field">
      <label for="task-title">Title</label>
      <input
        id="task-title"
        type="text"
        formControlName="title"
        placeholder="e.g. Take out the trash"
        autocomplete="off"
      />
      @if (form.controls.title.touched && form.controls.title.invalid) {
        <span class="field-error">A task title is required.</span>
      }
    </div>

    <div class="field">
      <label for="task-description">Description <span class="optional">(optional)</span></label>
      <input
        id="task-description"
        type="text"
        formControlName="description"
        placeholder="Add any helpful details…"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="task-tags">Tags <span class="optional">(optional)</span></label>
      <app-tag-input
        id="task-tags"
        formControlName="tags"
        [suggestions]="suggestions()"
      ></app-tag-input>
    </div>

    @if (isAdmin()) {
      <div class="field">
        <span class="field-label">Assign to <span class="optional">(optional)</span></span>
        <app-assignee-picker
          id="task-assignee"
          [members]="roster()"
          [value]="form.controls.assigneeId.value"
          (valueChange)="form.controls.assigneeId.setValue($event)"
        />
      </div>
    }

    <div class="modal-actions">
      <button type="button" class="btn btn--ghost" [disabled]="pending()" (click)="close()">
        Cancel
      </button>
      <button type="submit" class="btn" [disabled]="pending()">
        {{ pending() ? 'Adding…' : 'Add task' }}
      </button>
    </div>
  </form>
</section>
