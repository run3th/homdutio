<section
  class="sys-prompt"
  role="alertdialog"
  aria-modal="true"
  aria-labelledby="sys-prompt-title"
>
  <span class="sys-prompt-icon" aria-hidden="true">🔔</span>
  <h2 id="sys-prompt-title" class="sys-prompt-title">
    “Homdutio” Would Like to Send You Notifications
  </h2>
  <p class="sys-prompt-text">
    Notifications may include alerts, sounds and icon badges. These can be configured in Settings.
  </p>

  <div class="sys-prompt-actions">
    <button type="button" class="sys-prompt-btn" (click)="deny()">Don't Allow</button>
    <button type="button" class="sys-prompt-btn sys-prompt-btn--primary" (click)="allow()">
      Allow
    </button>
  </div>
</section>
