<section
  class="modal remove-confirm"
  role="alertdialog"
  aria-modal="true"
  aria-labelledby="remove-confirm-heading"
>
  <h2 id="remove-confirm-heading" class="modal-title">Remove member?</h2>
  <p class="dialog-body">
    “{{ member.displayName }}” will be removed from the household and lose access to its board. Any task
    they're working on returns to “To do”. This can't be undone.
  </p>

  <div class="modal-actions">
    <button type="button" class="btn btn--ghost" (click)="cancel()">Cancel</button>
    <button type="button" class="btn btn--danger" (click)="confirm()">Remove</button>
  </div>
</section>
