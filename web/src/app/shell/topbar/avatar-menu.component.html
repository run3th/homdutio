<button
  type="button"
  class="avatar-button"
  (click)="toggle()"
  [attr.aria-expanded]="open()"
  aria-haspopup="menu"
  aria-label="Account menu"
>
  <app-user-avatar [name]="displayName() ?? email()" [avatarUrl]="avatarUrl()" size="md" />
</button>

@if (open()) {
  <div class="avatar-menu" role="menu">
    <div class="avatar-menu-identity">
      @if (displayName(); as name) {
        <p class="avatar-menu-name">{{ name }}</p>
      }
      <p class="avatar-menu-email">{{ email() }}</p>
    </div>
    <button type="button" class="avatar-menu-item" role="menuitem" (click)="openSettings()">
      Settings
    </button>
    <button
      type="button"
      class="avatar-menu-item avatar-menu-item--danger"
      role="menuitem"
      (click)="logout()"
    >
      Log out
    </button>
  </div>
}
